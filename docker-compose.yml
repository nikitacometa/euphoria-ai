services:
  bot:
    build: .
    env_file: .env
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: "27017"
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    # Published on loopback only, for local tooling (mongosh, Compass).
    ports:
      - "127.0.0.1:${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:?MONGODB_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:?MONGODB_PASSWORD is required}
    restart: unless-stopped

  # Optional DB browser: `docker compose --profile tools up -d mongo-express`
  mongo-express:
    image: mongo-express:1
    profiles: ["tools"]
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGODB_USER:?MONGODB_USER is required}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_PASSWORD:?MONGODB_PASSWORD is required}
      ME_CONFIG_MONGODB_SERVER: mongodb
    depends_on:
      - mongodb

volumes:
  mongodb_data:
